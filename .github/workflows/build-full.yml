name: Build full (Boosty)

# Builds the FULL (non-trial) macOS app (Apple Silicon) and uploads it as a
# workflow ARTIFACT for manual upload to Boosty. The full Windows installer
# already exists; this covers macOS arm64. Run manually.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mac:
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Fetch static mac ffmpeg + ffprobe
        run: |
          set -euo pipefail
          npm i ffmpeg-static ffprobe-static
          mkdir -p bin
          cp "$(node -e "process.stdout.write(require('ffmpeg-static'))")" bin/ffmpeg
          cp "$(node -e "process.stdout.write(require('ffprobe-static').path)")" bin/ffprobe
          chmod +x bin/ffmpeg bin/ffprobe
      - name: Make app icon (.icns)
        run: sips -s format icns brand/logo.png --out assets/app.icns
      - name: Build .app (FULL)
        run: pyinstaller --noconfirm build-mac.spec
      - name: Ad-hoc sign + zip
        run: |
          set -euo pipefail
          APP="dist/Video Compressor.app"
          find "$APP" -type f \( -name ffmpeg -o -name ffprobe \) -exec chmod +x {} \;
          codesign --force --deep --sign - "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" VideoCompressor-mac-arm64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: video-compressor-mac
          path: VideoCompressor-mac-arm64.zip
          if-no-files-found: error
